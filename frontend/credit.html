<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Ledger – Zorvex ERP</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box {
            background: #fff; width: 460px; border-radius: 24px; padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            transform: translateY(30px) scale(0.95); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .modal-box { transform: translateY(0) scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h3 { font-size: 22px; font-weight: 800; color: var(--text-main); }
        .close-btn { background: none; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; }
        .close-btn:hover { color: var(--danger); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-light); font-size: 14px; font-weight: 500; outline: none; transition: 0.2s; background: #f8fafc; color: var(--text-main); box-sizing: border-box;}
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); background: #fff;}
        .primary-btn { width: 100%; padding: 16px; border-radius: 12px; background: var(--primary); color: #fff; font-size: 15px; font-weight: 700; border: none; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .primary-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .customer-card {
            background: #fff; border-radius: 16px; border: 1px solid var(--border-light);
            padding: 20px 24px; margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; transition: 0.2s;
        }
        .customer-card:hover, .customer-card.selected { box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-color: var(--primary); }
        .customer-card.selected { background: #f5f3ff; }
        .customer-name { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .customer-phone { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
        .balance-tag { font-size: 18px; font-weight: 800; }
        .balance-positive { color: #dc2626; } /* owes us money */
        .balance-zero { color: #16a34a; }
        .ledger-entry { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border-light); }
        .ledger-entry:last-child { border-bottom: none; }
        .entry-info { display: flex; flex-direction: column; gap: 2px; }
        .entry-type { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .entry-debit { color: #dc2626; }
        .entry-credit { color: #16a34a; }
        .entry-notes { font-size: 12px; color: var(--text-muted); }
        .entry-amount { font-size: 16px; font-weight: 800; }
        .sidebar-panel { 
            width: 340px; flex-shrink: 0; background: #fff; 
            border-radius: 20px; border: 1px solid var(--border-light); 
            padding: 20px; display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto; max-height: calc(100vh - 200px);
        }
        .ledger-panel { flex: 1; background: #fff; border-radius: 20px; border: 1px solid var(--border-light); padding: 24px; }
        .dual-layout { display: flex; gap: 20px; }
        .search-input { padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border-light); font-size: 14px; width: 100%; outline: none; background: #f8fafc; margin-bottom: 12px; box-sizing: border-box; }
        .search-input:focus { border-color: var(--primary); }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
        .empty-state p { font-size: 15px; font-weight: 500; }
    </style>
</head>
<body>
    

    <div class="content-wrapper">
        <header class="top-header">
            <div>
                <p style="color:var(--text-muted); font-size:14px; font-weight:500;">Finance / Accounts Receivable</p>
                <h1 class="page-title">Credit Ledger</h1>
            </div>
            <div class="header-actions">
                <button class="export-btn" id="openPaymentModalBtn">+ Record Payment</button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=4318ff&color=fff&rounded=true" alt="Admin">
                </div>
            </div>
        </header>

        <main class="main-canvas">

            <div class="kpi-grid" style="grid-template-columns: repeat(3, minmax(220px, 1fr)); margin-bottom: 24px;">
                <div class="kpi-card">
                    <div class="kpi-icon" style="color:#dc2626; background:#fef2f2;">💸</div>
                    <div class="kpi-info">
                        <p class="kpi-title">Total Outstanding</p>
                        <span class="kpi-value" id="totalOutstanding">PKR 0</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="color:#2563eb; background:#eff6ff;">👥</div>
                    <div class="kpi-info">
                        <p class="kpi-title">Clients with Balance</p>
                        <span class="kpi-value" id="clientsWithBalance">0</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="color:#16a34a; background:#f0fdf4;">✅</div>
                    <div class="kpi-info">
                        <p class="kpi-title">Cleared Accounts</p>
                        <span class="kpi-value" id="clearedAccounts">0</span>
                    </div>
                </div>
            </div>

            <div class="dual-layout">
                <!-- Customer List -->
                <div class="sidebar-panel">
                    <h3 style="font-size:16px; font-weight:800; margin-bottom:4px;">Customers</h3>
                    <input type="text" class="search-input" id="customerSearch" placeholder="Search by name or phone...">
                    <div id="customerList">
                        <p style="text-align:center; color:var(--text-muted); padding: 20px;">Loading...</p>
                    </div>
                </div>
                <!-- Ledger Panel -->
                <div class="ledger-panel">
                    <div id="ledgerPlaceholder" class="empty-state">
                        <p style="font-size: 40px; margin-bottom: 12px;">📒</p>
                        <p>Select a customer to view their credit history</p>
                    </div>
                    <div id="ledgerContent" style="display:none;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px;">
                            <div>
                                <h3 style="font-size:20px; font-weight:800;" id="ledgerCustomerName">—</h3>
                                <p style="color:var(--text-muted); font-size:13px;" id="ledgerCustomerPhone">—</p>
                            </div>
                            <div style="text-align:right;">
                                <p style="font-size:12px; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Total Balance</p>
                                <p id="ledgerBalance" style="font-size:28px; font-weight:900; color:#dc2626;">PKR 0</p>
                            </div>
                        </div>
                        <div id="ledgerEntries"></div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Record Payment Modal -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Record Customer Payment</h3>
                <button class="close-btn" id="closePaymentModal">×</button>
            </div>
            <form id="paymentForm">
                <div class="form-group">
                    <label>Customer</label>
                    <select id="paymentCustomer" class="form-input" required>
                        <option value="">Select Customer...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount Received (PKR)</label>
                    <input type="number" step="0.01" id="paymentAmount" class="form-input" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <input type="text" id="paymentNotes" class="form-input" placeholder="e.g. Cash received, Bank transfer">
                </div>
                <p id="paymentError" style="color:var(--danger);font-size:12px;font-weight:600;display:none;margin-bottom:10px;"></p>
                <button type="submit" class="primary-btn">Record Payment</button>
            </form>
        </div>
    </div>

    <script src="credit.js"></script>
<script src="shared-nav.js"></script>
</body>
</html>
