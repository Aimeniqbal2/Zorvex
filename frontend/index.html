<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zorvex ERP - Authenticate</title>
    <!-- Extremely clean webfont linking -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="magic-bg"></div>

    <div class="login-container">
        <div class="minimal-card">
            <div class="logo-section">
                <img src="assets/logo-full.png" alt="Zorvex"
                    style="width: 220px; margin-bottom: 15px; animation: gentleFloat 4s ease-in-out infinite;">
                <p>Sign in to your intelligent workspace</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="e.g. admin_techfix" autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required placeholder="••••••••••••">
                        <span class="toggle-password" id="togglePassword">Show</span>
                    </div>
                </div>

                <div class="auth-optional">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember Me
                    </label>
                </div>

                <div class="error-msg" id="errorMsg"></div>

                <button type="submit" class="magic-btn" id="loginBtn">
                    <span class="btn-text">Continue</span>
                    <span class="btn-loader" style="display: none;"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Handles logic cleanly independent of CSS mapping -->
    <script src="login.js"></script>
</body>

</html>
