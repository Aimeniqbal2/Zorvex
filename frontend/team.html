<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management - IAM</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-box {
            background: #fff; width: 420px; border-radius: 24px; padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            transform: translateY(30px) scale(0.95); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .modal-box { transform: translateY(0) scale(1); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h3 { font-size: 22px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px;}
        .close-btn { background: none; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; transition: 0.2s;}
        .close-btn:hover { color: var(--danger); transform: scale(1.1); }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-light); font-size: 14px; font-weight: 500; outline: none; transition: 0.2s; background: #f8fafc; color: var(--text-main);}
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); background: #fff;}
        select.form-input { cursor: pointer; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill="%23a3aed1" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: right 10px center;}
        
        .primary-btn { width: 100%; padding: 16px; border-radius: 12px; background: var(--primary); color: #fff; font-size: 15px; font-weight: 700; letter-spacing: -0.2px; border: none; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .primary-btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(67, 24, 255, 0.3); }
    </style>
</head>
<body>
    
    

    <div class="content-wrapper">
        
        <header class="top-header">
            <div>
                <p style="color:var(--text-muted); font-size: 14px; font-weight: 500;">HR Management</p>
                <h1 class="page-title">Employees Control</h1>
            </div>
            <div class="header-actions">
                <input type="text" class="search-box" id="searchInput" placeholder="Search identities...">
                <button class="icon-btn">🔔</button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=4318ff&color=fff&rounded=true" alt="Admin Badge">
                </div>
            </div>
        </header>

        <main class="main-canvas">
            
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon" style="color: #4318ff; background: #e9e3ff;">👥</div>
                    <div class="kpi-info">
                        <p class="kpi-title">Total Active Nodes</p>
                        <span class="kpi-value" id="kpiTotal">0</span>
                    </div>
                </div>

                <div class="kpi-card">
                    <div class="kpi-icon" style="color: #05cd99; background: #e6fcf5;">🛡️</div>
                    <div class="kpi-info">
                        <p class="kpi-title">Admin Supervisors</p>
                        <span class="kpi-value" id="kpiAdmins">0</span>
                    </div>
                </div>
                
                <div class="kpi-card">
                    <div class="kpi-icon" style="color: #ffb547; background: #fff8eb;">💳</div>
                    <div class="kpi-info">
                        <p class="kpi-title">POS Flow Cashiers</p>
                        <span class="kpi-value" id="kpiCashiers">0</span>
                    </div>
                </div>

                <div class="kpi-card">
                    <div class="kpi-icon" style="color: #ee5d50; background: #ffe2e0;">🛠️</div>
                    <div class="kpi-info">
                        <p class="kpi-title">Floor Technicians</p>
                        <span class="kpi-value" id="kpiTechs">0</span>
                    </div>
                </div>
            </div>

            <div class="panel-card">
                <div class="panel-header">
                    <h3>Employee Registry</h3>
                    <button class="export-btn" id="openModalBtn">+ Add Employee</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>IDENTIFIER HANDLE</th>
                                <th>RBAC CLEARANCE LEVEL</th>
                                <th>INITIALIZATION DATE</th>
                                <th>ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="teamTableBody">
                            <tr><td colspan="3" style="text-align:center; padding: 25px; color:var(--text-muted);">Intercepting Access API...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Identity Generator Modal -->
    <div class="modal-overlay" id="teamModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Add Employee</h3>
                <button class="close-btn" id="closeModalBtn">×</button>
            </div>
            <form id="teamForm">
                <div class="form-group">
                    <label>Assigned Handle (Username)</label>
                    <input type="text" id="username" class="form-input" required placeholder="e.g. john_tech" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Authentication Key (Password)</label>
                    <input type="password" id="password" class="form-input" required placeholder="Secure Encryption Key" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>RBAC Security Level</label>
                    <select id="role" class="form-input" required>
                        <option value="technician">Technician (Floor Ops)</option>
                        <option value="cashier">Cashier (POS Operations)</option>
                        <option value="manager">Manager (Strategic)</option>
                        <option value="admin">Administrator (Superuser)</option>
                    </select>
                </div>
                <p id="modalError" style="color:var(--danger); font-size:12px; margin-bottom:15px; font-weight:600; display:none;"></p>
                <button type="submit" class="primary-btn">Initialize Security Node</button>
            </form>
        </div>
    </div>

    <!-- Update Identity Modal -->
    <div class="modal-overlay" id="editTeamModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Update Credentials</h3>
                <button class="close-btn" id="closeEditModalBtn">×</button>
            </div>
            <form id="editTeamForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>Assigned Handle (Username)</label>
                    <input type="text" id="editUsername" class="form-input" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Overriding Key (Optional Password Reset)</label>
                    <input type="password" id="editPassword" class="form-input" placeholder="Leave blank to protect current cipher" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>RBAC Security Level</label>
                    <select id="editRole" class="form-input" required>
                        <option value="technician">Technician (Floor Ops)</option>
                        <option value="cashier">Cashier (POS Operations)</option>
                        <option value="manager">Manager (Strategic)</option>
                        <option value="admin">Administrator (Superuser)</option>
                    </select>
                </div>
                <p id="editModalError" style="color:var(--danger); font-size:12px; margin-bottom:15px; font-weight:600; display:none;"></p>
                <button type="submit" class="primary-btn">Flush & Override Node</button>
            </form>
        </div>
    </div>

    <script src="team.js"></script>
<script src="shared-nav.js"></script>
</body>
</html>
