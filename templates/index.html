{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zorvex ERP - Authenticate</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <!-- Live Animated Background -->
    <div class="animated-bg">
        <div class="blob shape1"></div>
        <div class="blob shape2"></div>
        <div class="blob shape3"></div>
        <div class="glass-overlay"></div>
    </div>

    <div class="login-container">
        <!-- The Glassmorphic Login Card -->
        <div class="minimal-card glass-panel">
            <div class="logo-section">
                <!-- Using a vibrant glowing text rendering since the PNG might clash with the fluid background -->
                <div class="brand-glow">
                    <img src="{% static 'assets/logo-full.png' %}" alt="Zorvex" style="width: 200px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4));">
                </div>
                <p class="subtitle">Secure Operational Matrix</p>
            </div>

            <form id="loginForm">
                <div class="input-group ui-anim" style="--delay: 1;">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="icon">👤</i>
                        <input type="text" id="username" required placeholder="e.g. admin_techfix" autocomplete="off">
                    </div>
                </div>

                <div class="input-group ui-anim" style="--delay: 2;">
                    <label for="password">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <i class="icon">🔒</i>
                        <input type="password" id="password" required placeholder="••••••••••••">
                        <span class="toggle-password" id="togglePassword">Show</span>
                    </div>
                </div>

                <div class="auth-optional ui-anim" style="--delay: 3;">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        <span style="margin-left:8px; color:var(--text-dark); font-size:13px; font-weight:600;">Trust this device</span>
                    </label>
                </div>

                <div class="error-msg" id="errorMsg"></div>

                <button type="submit" class="magic-btn ui-anim" id="loginBtn" style="--delay: 4;">
                    <span class="btn-text">Authenticate Network</span>
                    <span class="btn-loader" style="display: none;"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- The logic script handles the API mappings flawlessly without DOM breakage -->
    <script src="{% static 'login.js' %}"></script>
</body>
</html>
