<!DOCTYPE html>
<html lang="en">

<head>
  {% load static%}
  <meta charset="UTF-8">
  <title>ZORVEX</title>
  <link rel="icon" type="image/png" href="{% static 'assets/logo-icon.png' %}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;

      /* 🔥 CHANGE BACKGROUND */
      background: url('{% static "assets/bg-new.png" %}') no-repeat center/cover;
    }

    /* dark overlay (royal tone) */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(5, 10, 25, 0.377),
          rgba(5, 10, 25, 0.363));
    }

    /* wrapper */
    .wrapper {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding-right: 15%;
    }

    /* 🔥 ULTRA GLASS CARD */
    .card {
      width: 720px;
      height: 430px;
      display: flex;
      border-radius: 24px;
      overflow: hidden;

      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);

      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      border-left: 1px solid rgba(255, 255, 255, 0.3);

      box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.4),
        inset 0 0 20px rgba(255, 255, 255, 0.05);
    }

    /* LEFT */
    .left {
      width: 50%;
      padding: 45px 40px;
      color: #eaeefc;
      position: relative;
    }

    /* soft divider glow */
    .left::after {
      content: '';
      position: absolute;
      top: 10%;
      right: 0;
      width: 1px;
      height: 80%;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 20px 0 50px rgba(0, 0, 0, 0.9);
    }

    /* LOGO */
    .logo {
      text-align: center;
      font-size: 60px;
      font-weight: 600;
      letter-spacing: 3px;
      animation: 4s ease-in-out infinite;

      /* background: linear-gradient(90deg,#7aa2ff,#c3d4ff); */
      -webkit-background-clip: text;
      /* -webkit-text-fill-color:transparent; */
    }

    .logo img {
      /* height: 150px; */
      width: 250px;
      display: block;
      margin: 0 auto;
      margin-top: 15px;
      margin-bottom: 30px;
      animation: 4s ease-in-out infinite;

    }

    /* inputs */
    .input-box {
      margin-bottom: 18px;
    }

    .input-box input {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      border-radius: 12px;

      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 14px;

      transition: 0.3s;
    }

    /* focus glow */
    .input-box input:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 0 1px rgba(122, 162, 255, 0.4),
        0 0 20px rgba(122, 162, 255, 0.15);
    }

    .input-box input::placeholder {
      color: #aaa;
    }

    /* options */
    .options {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin: 12px 0 22px;
      color: #bbb;
    }

    .options input {
      margin-right: 6px;
    }

    /* button */
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;

      background: linear-gradient(135deg, #4c6fff, #2f49d1);
      color: #fff;
      font-weight: 500;
      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(76, 111, 255, 0.4);
    }

    /* RIGHT IMAGE */
    .right {
      width: 50%;
      background: url('{% static "assets/right_img.png" %}') no-repeat center/cover;
    }

    /* responsive */
    @media(max-width: 1200px) {
      .wrapper {
        padding-right: 5%;
      }
    }

    @media(max-width: 900px) {
      .wrapper {
        justify-content: center;
        padding: 0 20px;
      }

      .card {
        flex-direction: column-reverse;
        /* Form on bottom, image on top, or just column */
        flex-direction: column;
        width: 100%;
        max-width: 450px;
        height: auto;
      }

      .left,
      .right {
        width: 100%;
      }

      .left {
        padding: 35px 30px;
      }

      .right {
        height: 200px;
      }

      .left::after {
        display: none;
      }

      .logo img {
        width: 200px;
        margin-bottom: 25px;
      }
    }

    @media(max-width: 480px) {
      .wrapper {
        padding: 0 15px;
      }

      .card {
        border-radius: 16px;
      }

      .left {
        padding: 25px 20px;
      }

      .right {
        height: 150px;
      }

      .logo img {
        width: 180px;
        margin-bottom: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <div class="card minimal-card">

      <div class="left">

        <div class="logo">
          <img src="{% static 'assets/logo-full.png' %}" alt="ZORVEX Logo" style="animation: 4s ease-in-out infinite;">
        </div>

        <div id="errorMsg"
          style="color: #ff6b6b; font-size: 13px; text-align: center; margin-bottom: 10px; opacity: 0; transition: 0.3s;">
        </div>
        <form id="loginForm">
          <div class="input-box">
            <input type="text" id="username" placeholder="Username" required>
          </div>

          <div class="input-box" style="position: relative;">
            <input type="password" id="password" placeholder="Password" required>
            <span id="togglePassword"
              style="position:absolute; right:15px; top:14px; font-size:12px; color:#aaa; cursor:pointer;">Show</span>
          </div>

          <div class="options">
            <label><input type="checkbox" id="rememberMe"> Remember me</label>
            <a href="#" style="color:#9bb3ff;">Forgot?</a>
          </div>

          <button id="loginBtn" type="submit">
            <span class="btn-text">Login</span>
            <span class="btn-loader" style="display:none;">Logging in...</span>
          </button>
        </form>

      </div>

      <div class="right"></div>

    </div>

  </div>

  <script src="{% static 'login.js' %}?v=1.2"></script>
</body>

</html>
