{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions System</title>
    <link rel="stylesheet" href="{% static 'dashboard.css' %}">
    <style>
        .filters-row {
            display: flex; gap: 15px; margin-bottom: 25px; align-items: center; justify-content: space-between;
        }
        .filter-group {
            display: flex; gap: 15px; flex: 1;
        }
        .filter-input {
            padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border-light);
            font-size: 14px; outline: none; transition: 0.3s; width: 100%; max-width: 300px;
            background: var(--input-bg); color: var(--text-main);
        }
        .filter-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 24, 255, 0.1); }
        .badge {
            padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block;
        }
        .bg-cash { background-color: #e6fcf5; color: #05cd99; }
        .bg-credit { background-color: rgba(255,181,71,0.1); color: #ffb547; }
        .bg-wallet { background-color: #e9e3ff; color: #4318ff; }
        .clickable-row { cursor: pointer; transition: background-color 0.2s ease; }
        .clickable-row:hover { background-color: var(--table-hover); }
    </style>
</head>
<body>
    
    <!-- Sidebar via script -->
    
    <div class="content-wrapper">
        <header class="top-header">
            <div>
                <p style="color:var(--text-muted); font-size: 14px; font-weight: 500;">Operations / Ledger</p>
                <h1 class="page-title">Global Transactions</h1>
            </div>
            
            <div class="header-actions">
                <input type="text" class="search-box" placeholder="Search across ERP..." data-global-search>
                <button class="icon-btn">🔔</button>
                <div class="user-profile">
                    <img src="" alt="Badge">
                </div>
            </div>
        </header>

        <main class="main-canvas">
            
            <div class="panel-card" style="margin-top: 5px;">
                <div class="panel-header" style="border-bottom: none; padding-bottom: 0;">
                    <h3>Historical Ledger Readout</h3>
                </div>
                
                <div class="filters-row" style="padding: 20px;">
                    <div class="filter-group">
                        <input type="text" id="searchInput" class="filter-input" placeholder="Search by ID, Customer Name, or Phone...">
                        <select id="methodFilter" class="filter-input" style="max-width: 200px;">
                            <option value="">All Methods</option>
                            <option value="cash">Cash Settlement</option>
                            <option value="credit">B2B Credit</option>
                            <option value="wallet">Digital Wallet</option>
                        </select>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>TRANSACTION ID</th>
                                <th>TIMESTAMP</th>
                                <th>CUSTOMER INFO</th>
                                <th>SALE TYPE</th>
                                <th>TOTAL AMOUNT</th>
                                <th>PAYMENT METHOD</th>
                            </tr>
                        </thead>
                        <tbody id="salesTableBody">
                            <tr><td colspan="6" style="color:#a3aed1; text-align:center; padding: 45px;">Loading transaction ledger securely...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Universal Thermal Receipt Modal -->
    <style>
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s ease; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box {
            background: var(--modal-bg); width: 450px; border-radius: 28px; padding: 40px;
            transform: translateY(20px); transition: 0.3s; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .primary-btn {
            width: 100%; padding: 16px; border-radius: 14px; background: var(--primary);
            color: #fff; font-weight: 800; border: none; cursor: pointer;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(67, 24, 255, 0.2);
        }
        @media print {
            body * { visibility: hidden; }
            #receiptModal { background: none !important; backdrop-filter: none !important; position: absolute; left: 0; top: 0; width: 80mm; }
            #receiptModal .modal-box { box-shadow: none; padding: 0; border-radius: 0; width: 100%; transform: none; }
            #receiptContent, #receiptContent * { visibility: visible; color: #000; background: var(--modal-bg); }
            #receiptContent { position: absolute; left: 0; top: 0; width: 80mm; padding: 5mm; margin: 0; border: none; }
            #receiptModal .modal-box > div:last-child { display: none !important; }
        }
    </style>
    <div class="modal-overlay" id="receiptModal">
        <div class="modal-box" style="width:400px; padding:0; overflow:hidden;">
            <div id="receiptContent" style="background:var(--modal-bg); padding:30px; font-family:'Courier New', monospace; font-size:13px; color:#111;">
                <!-- Dynamo Printing Output -->
            </div>
            <div style="padding:20px; background:#f8fafc; border-top:1px dashed #e2e8f0; display:flex; gap:10px;">
                <button class="primary-btn" style="margin-top:0;" onclick="window.print()">Print Document</button>
                <button class="primary-btn" style="margin-top:0; background:var(--text-muted);" id="closeReceiptBtn">Dismiss</button>
            </div>
        </div>
    </div>

    <script src="{% static 'sales-history.js' %}"></script>
    <script src="{% static 'shared-nav.js' %}"></script>
</body>
</html>
