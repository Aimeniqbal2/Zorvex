{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Desk - Services</title>
    <link rel="stylesheet" href="{% static 'dashboard.css' %}">
    <style>
        .service-layout { height: auto; margin-bottom: 20px;}
        .work-card { background: #fff; border: 1px solid var(--border-light); border-radius: 16px; padding: 25px; margin-bottom: 20px; box-shadow: var(--shadow-sm); display: flex; justify-content: space-between; align-items: center; transition: 0.2s cubic-bezier(0.16, 1, 0.3, 1);}
        .work-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--primary-light); }
        
        .work-info h3 { font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 5px; letter-spacing: -0.3px;}
        .work-info p { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 10px;}
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        
        .work-actions { display: flex; gap: 10px; }
        .action-btn { padding: 12px 18px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; border: none; }
        .btn-start { background: var(--warning); color: #fff; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(255, 181, 71, 0.4); }
        .btn-finish { background: var(--success); color: #fff; }
        .btn-finish:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(5, 205, 153, 0.4); }
        .btn-disabled { background: #f1f5f9; color: var(--text-muted); cursor: not-allowed; }
    </style>
</head>
<body>
    

    <div class="content-wrapper">
        <header class="top-header">
            <div>
                <p style="color:var(--text-muted); font-size: 14px; font-weight: 500;">Repairs</p>
                <h1 class="page-title">Service Desk Dispatch</h1>
            </div>
            <div class="header-actions">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Tech&background=ffb547&color=fff&rounded=true" alt="Technician">
                </div>
            </div>
        </header>

        <main class="main-canvas">
            <div class="panel-card service-layout" style="background: transparent; box-shadow: none; padding: 0;">
                <div class="panel-header">
                    <h3>Active Service Orders</h3>
                    <!-- In a real app we'd trigger a precise Work Order Creation modal here too! -->
                </div>
                
                <!-- The Kanban List Pipeline -->
                <div id="serviceList">
                    <div style="text-align:center; padding: 50px; color: var(--text-muted); font-weight: 600;">
                        Polling API Queue for Maintenance Flags...
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Integrates with identical underlying backend constraints -->
    <script src="{% static 'services.js' %}"></script>
<script src="{% static 'shared-nav.js' %}"></script>
</body>
</html>
